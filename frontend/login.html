<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBloom Auth</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#7111e6,#6a2799);
}

.container{
  width:900px;
  height:520px;
  display:flex;
  border-radius:16px;
  overflow:hidden;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.left{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  font-size:22px;
  font-weight:600;
  background: linear-gradient(135deg,#1E293B,#a074ff);
}

.right{
  flex:1;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background: rgb(90, 18, 184);
  color:white;
}

h2{ margin-bottom:8px; }
p{ margin-bottom:20px; font-size:14px; color:#9CA3AF; }

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
}

button{
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#3B82F6;
  color:white;
  cursor:pointer;
}

.switch{
  margin-top:15px;
  font-size:13px;
  cursor:pointer;
  color:#60A5FA;
}

.hidden{ display:none; }
</style>
</head>

<body>

<div class="container">

  <div class="left">
    BrainBloom AI
  </div>

  <div class="right">

    <!-- LOGIN -->
    <div id="loginForm">
      <h2>Welcome Back</h2>
      <p>Sign in to continue</p>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="handleLogin()">Login</button>
      <div class="switch" onclick="toggleForm()">Create an account</div>
    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="hidden">
      <h2>Create Account</h2>
      <p>Start learning with AI</p>
      <input type="text" id="signupName" placeholder="Full Name">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password">
      <input type="password" id="signupConfirm" placeholder="Confirm Password">
      <button onclick="handleSignup()">Sign Up</button>
      <div class="switch" onclick="toggleForm()">Already have an account?</div>
    </div>

  </div>
</div>

<script>
const BASE_URL = "https://brainbloom-production.up.railway.app";

// SWITCH FORM
function toggleForm(){
  document.getElementById('loginForm').classList.toggle('hidden');
  document.getElementById('signupForm').classList.toggle('hidden');
}

// LOGIN
async function handleLogin() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  if (!email || !password) return alert("Fill all fields");

  try {
    const res = await fetch(`${BASE_URL}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      window.location.href = "dashboard.html";
    } else {
      alert(data.message || "Login failed");
    }

  } catch {
    alert("Server error");
  }
}

// SIGNUP
async function handleSignup() {
  const name = document.getElementById("signupName").value;
  const email = document.getElementById("signupEmail").value;
  const password = document.getElementById("signupPassword").value;
  const confirm = document.getElementById("signupConfirm").value;

  if (!name || !email || !password || !confirm) {
    return alert("Fill all fields");
  }

  if (password !== confirm) {
    return alert("Passwords do not match");
  }

  try {
    const res = await fetch(`${BASE_URL}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      window.location.href = "dashboard.html";
    } else {
      alert(data.message || "Signup failed");
    }

  } catch {
    alert("Server error");
  }
}
</script>

</body>
</html>
